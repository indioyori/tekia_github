<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TEKIA{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-book-open"></i>
                    <span>TEKIA</span>
                </div>
                <nav class="main-nav">
                    <a href="/rag" class="nav-link {% if request.url.path == '/rag' %}active{% endif %}">
                        <i class="fas fa-search"></i> Investigar
                    </a>
                    <a href="/notes" class="nav-link {% if request.url.path == '/notes' %}active{% endif %}">
                        <i class="fas fa-book"></i> Cuaderno
                    </a>
                    <a href="/alerts" class="nav-link {% if request.url.path == '/alerts' %}active{% endif %}">
                        <i class="fas fa-bell"></i> Alertas
                    </a>
                </nav>
                <div class="header-actions">
                    <a href="/api/docs" class="btn btn-sm btn-ghost" target="_blank">
                        <i class="fas fa-code"></i> API
                    </a>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-content">
                <p>TEKIA v2.1.0 | Sistema soberano de investigación</p>
                <p class="footer-subtitle">Sin nube. Sin LLM. Sin telemetría.</p>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js?v=4"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
