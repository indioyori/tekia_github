version: '3.8'

services:
  tekia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tekia
    ports:
      - "8100:8100"
    volumes:
      - ./data:/app/data
      - ./keys:/app/keys
      - ./models:/app/models
      - ./bias_vocab:/app/bias_vocab
      - ./backups:/app/backups
    environment:
      - OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
    restart: unless-stopped
    
  # Opcional: SearXNG para búsqueda (fallback)
